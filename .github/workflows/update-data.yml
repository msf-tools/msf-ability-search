name: Update Character Data

on:
  schedule:
    # Run daily at 6am UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch latest character data
        env:
          # MSF_CLIENT_ID is hardcoded in the script (public SPA client ID)
          # Add MSF_CLIENT_SECRET secret if you register a M2M/backend app in the portal
          MSF_CLIENT_SECRET: ${{ secrets.MSF_CLIENT_SECRET }}
          # Optional: override the default public beta API key
          # MSF_API_KEY: ${{ secrets.MSF_API_KEY }}
        run: node scripts/fetch-data.js

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet public/data/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git commit -m "chore: update character data $(date -u +%Y-%m-%d)"
          git push
